name: Build & Sign APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 now

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ────────────────────────────────────────────────────────────
      # AGP 9.x requires JDK 17+
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Secrets ─────────────────────────────────────────────────────────
      # The Secrets Gradle Plugin reads GEMINI_API_KEY from a .env file
      # (secrets { propertiesFileName = ".env" } in app/build.gradle.kts).
      - name: Write .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      # ── 4. Keystore ─────────────────────────────────────────────────────────
      # app/build.gradle.kts signing config reads:
      #   storeFile   = file(KEYSTORE_PATH  ?: "${rootDir}/my-upload-key.jks")
      #   storePassword = STORE_PASSWORD
      #   keyAlias      = "upload"
      #   keyPassword   = KEY_PASSWORD
      - name: Decode & write keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/my-upload-key.jks"

      # ── 5. Gradle permissions ───────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 6. Build ────────────────────────────────────────────────────────────
      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      # ── 7. Upload log on failure ────────────────────────────────────────────
      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      # ── 8. Upload APK ───────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
