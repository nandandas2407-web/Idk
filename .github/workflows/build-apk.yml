name: Build & Sign APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ────────────────────────────────────────────────────────────
      # AGP 9.x requires JDK 17+
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle            # caches ~/.gradle automatically

      # ── 3. Secrets ─────────────────────────────────────────────────────────
      # The project reads GEMINI_API_KEY from a .env file via the Secrets
      # Gradle Plugin (secrets { propertiesFileName = ".env" }).
      # We write it here so Gradle can pick it up at build time.
      - name: Write .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      # ── 4. Keystore ─────────────────────────────────────────────────────────
      # Store your keystore as a base-64 GitHub Secret named KEYSTORE_BASE64.
      # The signing config in app/build.gradle.kts reads:
      #   storeFile   = file(System.getenv("KEYSTORE_PATH") ?: "${rootDir}/my-upload-key.jks")
      #   storePassword = System.getenv("STORE_PASSWORD")
      #   keyPassword   = System.getenv("KEY_PASSWORD")
      - name: Decode & write keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/my-upload-key.jks"

      # ── 5. Gradle permissions ───────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 6. Build ────────────────────────────────────────────────────────────
      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # ── 7. Upload artifact ──────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
