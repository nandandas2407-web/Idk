name: Build & Sign APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by AGP 9.x) ───────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Install Gradle (since gradlew is not in the repo) ────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      # ── 4. Generate Gradle wrapper so all tasks work normally ───────────────
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.11.1

      # ── 5. Write .env (Secrets Gradle Plugin reads GEMINI_API_KEY from it) ──
      - name: Write .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      # ── 6. Decode keystore ──────────────────────────────────────────────────
      # app/build.gradle.kts signing config:
      #   storeFile   = file(KEYSTORE_PATH ?: "${rootDir}/my-upload-key.jks")
      #   storePassword = STORE_PASSWORD
      #   keyAlias      = "upload"
      #   keyPassword   = KEY_PASSWORD
      - name: Decode & write keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/my-upload-key.jks"

      # ── 7. Build release APK ────────────────────────────────────────────────
      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      # ── 8. Upload build log on failure ──────────────────────────────────────
      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      # ── 9. Upload APK ───────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
